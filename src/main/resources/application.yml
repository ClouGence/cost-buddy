spring:
  application:
    name: cost-buddy
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/costbuddy?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: costbuddy_user
    password: 'CostBuddy@2026'
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.costbuddy
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8766

management:
  endpoints:
    web:
      exposure:
        include: health,info

motherboard:
  enabled: ${MOTHERBOARD_ENABLED:false}
  base-url: ${MOTHERBOARD_BASE_URL:}
  product-id: ${MOTHERBOARD_PRODUCT_ID:0}
  private-key: ${MOTHERBOARD_PRIVATE_KEY:}
  timeout: ${MOTHERBOARD_TIMEOUT:30s}
